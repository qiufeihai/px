name: px-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag, e.g. v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-client:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_suffix: macos
            tauri_bundles: app
            bundle_dir: target/release/bundle/macos
          - os: windows-latest
            artifact_suffix: windows
            tauri_bundles: none
            bundle_dir: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/tauri-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - uses: actions/setup-go@v5
        if: runner.os != 'Linux'
        with:
          go-version: '1.26'

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: px-release-${{ runner.os }}

      - uses: actions/cache@v4
        id: tun-helper-cache
        with:
          path: bin
          key: ${{ runner.os }}-tun-helper-${{ hashFiles('scripts/fetch-tun-helper.sh', 'scripts/repair-tun-helper.ps1') }}

      - name: Install frontend deps
        working-directory: apps/tauri-ui
        run: npm ci

      - name: Fetch TUN helper (Linux)
        if: runner.os == 'Linux' && steps.tun-helper-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          chmod +x scripts/fetch-tun-helper.sh
          scripts/fetch-tun-helper.sh

      - name: Build macOS Go TUN helper
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin
          cd helpers/px-tun-helper
          go build -o ../../bin/px-tun-helper ./cmd/px-tun-helper

      - name: Fetch TUN helper (Windows)
        if: runner.os == 'Windows' && steps.tun-helper-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bin -Force | Out-Null
          scripts/repair-tun-helper.ps1

      - name: Build tauri app
        working-directory: apps/tauri-ui
        run: npm run tauri -- build --bundles ${{ matrix.tauri_bundles }}

      - name: Build macOS DNS helper
        if: runner.os != 'Windows'
        run: cargo build --release -p px-dns-helper

      - name: Verify TUN helper (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            test -f "bin/px-tun-helper"
          else
            test -f "bin/tun2socks"
          fi

      - name: Verify TUN helper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "bin/px-tun-helper.exe")) { throw "missing bin/px-tun-helper.exe" }
          if (!(Test-Path "bin/wintun.dll")) { throw "missing bin/wintun.dll" }

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/config
          mkdir -p release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/bin
          mkdir -p release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp config/client.windows.prod.example.toml release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/config/client.toml
          else
            cp config/client.prod.example.toml release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/config/client.toml
          fi
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            test -f "bin/px-tun-helper.exe"
            test -f "bin/wintun.dll"
            cp bin/px-tun-helper.exe release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/bin/px-tun-helper.exe
            cp bin/wintun.dll release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/bin/wintun.dll
            cp scripts/repair-tun-helper.ps1 release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts/repair-tun-helper.ps1
            if [[ -f "target/release/px.exe" ]]; then
              cp "target/release/px.exe" "release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px.exe"
            elif [[ -f "target/release/PX 个人代理.exe" ]]; then
              cp "target/release/PX 个人代理.exe" "release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px.exe"
            elif [[ -f "target/release/tauri-ui.exe" ]]; then
              cp target/release/tauri-ui.exe release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px.exe
            fi
          else
            test -f "bin/px-tun-helper"
            test -f "target/release/px-dns-helper"
            cp bin/px-tun-helper release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/bin/px-tun-helper
            cp target/release/px-dns-helper release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/bin/px-dns-helper
            cp scripts/open-macos-app.sh release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts/open-macos-app.sh
            cp scripts/macos-tun-helper.sh release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts/macos-tun-helper.sh
            chmod +x release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts/open-macos-app.sh
            chmod +x release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/scripts/macos-tun-helper.sh
          fi

          if [[ "${{ matrix.os }}" != windows-* ]] && [[ -f "target/release/px" ]]; then
            cp "target/release/px" "release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px"
          elif [[ "${{ matrix.os }}" != windows-* ]] && [[ -f "target/release/PX 个人代理" ]]; then
            cp "target/release/PX 个人代理" "release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px"
          elif [[ "${{ matrix.os }}" != windows-* ]] && [[ -f "target/release/tauri-ui" ]]; then
            cp target/release/tauri-ui release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/px
          fi

          if [[ -d "${{ matrix.bundle_dir }}" ]]; then
            find "${{ matrix.bundle_dir }}" -mindepth 1 -maxdepth 1 -print0 | while IFS= read -r -d '' path; do
              cp -R "$path" "release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}/"
            done
          fi

          if [[ "${{ matrix.os }}" != windows-* ]]; then
            RELEASE_DIR="release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}"
            if [[ -d "$RELEASE_DIR/PX 个人代理.app" ]]; then
              mv "$RELEASE_DIR/PX 个人代理.app" "$RELEASE_DIR/px.app"
            elif [[ ! -d "$RELEASE_DIR/px.app" ]]; then
              APP_PATH="$(find "$RELEASE_DIR" -maxdepth 1 -name "*.app" -type d | head -n 1)"
              if [[ -n "$APP_PATH" ]]; then
                mv "$APP_PATH" "$RELEASE_DIR/px.app"
              fi
            fi
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}
          path: release/px-${{ needs.resolve-tag.outputs.tag }}-${{ matrix.artifact_suffix }}

  publish-release:
    needs:
      - resolve-tag
      - build-client
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Archive release files
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          for dir in */; do
            base="${dir%/}"
            if [[ "$base" == *-macos ]]; then
              tar -czf "${base}.tar.gz" "$base"
            elif [[ "$base" == *-windows ]]; then
              zip -qr "${base}.zip" "$base"
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
